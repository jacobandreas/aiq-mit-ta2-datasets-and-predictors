family: gpt2_small_ft
# GPT-2 small (124M) trained from scratch on the task.
model_name_or_path: gpt2_small_ft_scratch
tokenizer_name_or_path: gpt2
zero_shot: false
max_new_tokens: 32
eval_batch_size: 32
dtype: float32
training:
  lr: 5.0e-4
  batch_size: 32
  max_epochs: 30
  eval_steps: 500
  val_eval_items: 200
  patience: 5
  warmup_steps: 500
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  weight_decay: 0.1
