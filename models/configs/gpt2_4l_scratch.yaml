family: gpt2_4l_scratch
# 4-layer GPT-2-style model trained from scratch.
# model_name_or_path is a spec string; the trainer instantiates via GPT2Config.
model_name_or_path: gpt2_4l_scratch
tokenizer_name_or_path: gpt2
zero_shot: false
max_new_tokens: 32
eval_batch_size: 64
dtype: float32
training:
  lr: 1.0e-3
  batch_size: 64
  max_epochs: 50
  eval_steps: 500
  val_eval_items: 200
  patience: 5
  warmup_steps: 500
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  weight_decay: 0.1
