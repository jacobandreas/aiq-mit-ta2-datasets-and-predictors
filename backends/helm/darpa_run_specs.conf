# DARPA Run Specifications
# Configuration file for HELM evaluation of EWOK, permutation composition, arithmetic and causal tasks
#
# Usage:
#   export PYTHONPATH=$PWD:$PYTHONPATH
#   helm-run \
#     --conf-paths backends/helm/darpa_run_specs.conf \
#     --models-to-run meta-llama/Llama-3.2-3B \
#     --suite darpa_eval \
#     --output-path benchmark_output

entries: [

  # ── arithmetic_fixed ────────────────────────────────────────────────────────
  # Cross-lingual generalisation: train on english+symbolic, test on spanish+italian.

  {
    description: "arithmetic_fixed:split_config=cross_lingual"
    priority: 1
  }

  # ── arithmetic_parametric ────────────────────────────────────────────────────
  # Format generalisation (symbolic+English train, Spanish val, Italian+Chinese test)
  # and skill composition ({+,-} & {+,*} train, {+,-,*} val, {-,*} test).

  {
    description: "arithmetic_parametric:split_config=arithmetic_by_format"
    priority: 1
  }

  {
    description: "arithmetic_parametric:split_config=arithmetic_by_skill"
    priority: 1
  }

  # ── state_tracking ───────────────────────────────────────────────────────────
  # Length generalisation (train length-10, val 11-12, test 13-14) and
  # format generalisation (symbolic train, code val, natural-language test).

  {
    description: "state_tracking:split_config=state_tracking_by_length"
    priority: 1
  }

  {
    description: "state_tracking:split_config=state_tracking_by_format"
    priority: 1
  }

  # ── causal_inference ─────────────────────────────────────────────────────────
  # Boolean-gate DAG queries (observation + structural), varying DAG size and
  # training density.

  {
    description: "causal_inference:split_config=causal_default"
    priority: 1
  }

  # ── world_modeling ───────────────────────────────────────────────────────────
  # EWOK-CORE multiple-choice; all domains combined, then per-domain.

  {
    description: "world_modeling"
    priority: 1
  }

  {
    description: "world_modeling:domain=agent-properties"
    priority: 2
  }

  {
    description: "world_modeling:domain=material-dynamics"
    priority: 2
  }

  {
    description: "world_modeling:domain=material-properties"
    priority: 2
  }

  {
    description: "world_modeling:domain=physical-dynamics"
    priority: 2
  }

  {
    description: "world_modeling:domain=physical-interactions"
    priority: 2
  }

  {
    description: "world_modeling:domain=physical-relations"
    priority: 2
  }

  {
    description: "world_modeling:domain=quantitative-properties"
    priority: 2
  }

  {
    description: "world_modeling:domain=social-interactions"
    priority: 2
  }

  {
    description: "world_modeling:domain=social-properties"
    priority: 2
  }

  {
    description: "world_modeling:domain=social-relations"
    priority: 2
  }

  {
    description: "world_modeling:domain=spatial-relations"
    priority: 2
  }

]
