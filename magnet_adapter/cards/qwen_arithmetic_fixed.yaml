title: "CircuitOverlap Predictor — Qwen3 / arithmetic_fixed"
description: |
  The circuit overlap predictor (circuit_overlap) should achieve above-chance
  AUC when predicting per-instance accuracy on the arithmetic_fixed
  cross_lingual evaluation split for Qwen3 base models.

  The predictor is fit on the val split (english+symbolic examples) and
  evaluated on the test split (spanish+italian examples).  AUC is computed
  against ground-truth exact-match labels.

version: 1.0

organizations:
  - MIT

submitter:
  name: MIT TA2 Team
  email: jda@mit.edu

tags:
  - qwen
  - predictor
  - circuit_overlap
  - arithmetic
  - cross_lingual
  - instance_prediction

links:
  - title: "darpa3 (predictor source)"
    url: "https://github.com/mit-ll/darpa3"
    type: "software"
  - title: "arithmetic_fixed dataset"
    url: "https://github.com/mit-ll/aiq-mit-ta2"
    type: "dataset"

pipeline:
  run_circuit_overlap:
    executable: 'python -u magnet_adapter/run_predictor_card.py'
    algo_params:
      runs_dir: '/raid/lingo/jda/code/darpa3/runs'
      domain: 'arithmetic_fixed'
      split_config: 'cross_lingual'
      model_family: 'qwen'
      models_root: '/raid/lingo/models'
      k_fraction: 0.01
      batch_size: 4
    out_paths:
      results_fpath: 'results.json'

symbols:
  threshold:
    type: float
    value: 0.65

  model:
    sweep:
      - Qwen3-4B

  auc:
    type: float
    depends_on:
      - model
      - auc_by_model
    python: |
      auc = auc_by_model[model]

claim:
  python: |
    assert auc >= threshold, (
        f"CircuitOverlap AUC for {model} ({auc:.3f}) is below threshold ({threshold:.2f}) "
        f"on arithmetic_fixed/cross_lingual"
    )
