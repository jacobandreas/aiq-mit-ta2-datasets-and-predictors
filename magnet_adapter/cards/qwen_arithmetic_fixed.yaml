title: "CircuitOverlap Predictor — Qwen3 / arithmetic_fixed"
description: |
  The circuit overlap predictor should achieve above-chance AUC when
  predicting per-instance accuracy on the arithmetic_fixed cross_lingual
  evaluation split for Qwen3 base models.

  The predictor is fit on the HELM TRAIN split (english+symbolic examples)
  and evaluated on the HELM TEST split (spanish+italian examples).  AUC
  is computed against ground-truth exact-match labels.

version: 1.0

organizations:
  - MIT

submitter:
  name: MIT TA2 Team
  email: jda@mit.edu

tags:
  - qwen
  - predictor
  - circuit_overlap
  - arithmetic
  - cross_lingual
  - instance_prediction

links:
  - title: "darpa3 (predictor source)"
    url: "https://github.com/mit-ll/darpa3"
    type: "software"
  - title: "arithmetic_fixed dataset"
    url: "https://github.com/mit-ll/aiq-mit-ta2"
    type: "dataset"

pipeline:
  run_circuit_overlap:
    executable: '/raid/lingo/jda/anaconda3/envs/darpa3-helm/bin/python -u magnet_adapter/run_predictor_card.py'
    algo_params:
      helm_runs_path: './benchmark_output'
      run_spec_pattern: 'arithmetic_fixed*Qwen*'
      models_root: '/raid/lingo/models'
      k_fraction: 0.01
      batch_size: 4
    out_paths:
      results_fpath: 'results.json'

symbols:
  threshold:
    type: float
    value: 0.65

  model:
    sweep:
      - Qwen3-4B

  auc:
    type: float
    depends_on:
      - model
      - auc_by_model
    python: |
      auc = auc_by_model[model]

claim:
  python: |
    assert auc >= threshold, (
        f"CircuitOverlap AUC for {model} ({auc:.3f}) is below threshold ({threshold:.2f}) "
        f"on arithmetic_fixed/cross_lingual"
    )
